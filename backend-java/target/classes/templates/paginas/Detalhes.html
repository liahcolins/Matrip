<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Matrip — Detalhes do Passeio</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- CSS do projeto -->
  <link rel="stylesheet" href="/css/navbar.css">
  <link rel="stylesheet" href="/css/Detalhes.css">
</head>

<body xmlns:th="http://www.thymeleaf.org">
  <!-- Navbar -->
  <div th:insert="~{navbar :: navbar}"></div>

  <main class="container my-4">

    <div class="row g-4">

      <!-- ESQUERDA -->
      <div class="col-lg-8">

        <!-- TÍTULO + META -->
        <div class="mb-3" id="passeioHeader">
          <h1 id="passeioTitulo" class="fw-bold mb-1" th:text="${passeio.local}">Nome do Passeio</h1>
          <p id="passeioCategoria" class="text-muted mb-0" th:text="'Categoria: ' + ${#strings.toUpperCase(passeio.categoria)}">Categoria</p>
          <p id="passeioCidadeEstado" class="text-muted mb-0" th:text="'📍 ' + ${passeio.cidade} + ' / ' + ${passeio.estado}">Cidade/Estado</p>
        </div>

        <!-- CARROSSEL -->
        <section class="detalhes-carrossel mb-4">
          <div id="carouselExample" class="carousel slide" data-bs-ride="carousel">
            <div class="carousel-indicators">
              <button th:each="img, iterStat : ${passeio.imagens}" 
                      type="button" 
                      data-bs-target="#carouselExample" 
                      th:data-bs-slide-to="${iterStat.index}" 
                      th:classappend="${iterStat.index == 0} ? 'active' : ''" 
                      th:aria-current="${iterStat.index == 0} ? 'true' : 'false'" 
                      th:aria-label="'Slide ' + ${iterStat.index + 1}"></button>
            </div>
            <div class="carousel-inner" style="border-radius: 8px; overflow: hidden; max-height: 450px;">
              <div th:each="img, iterStat : ${passeio.imagens}" 
                   th:classappend="${iterStat.index == 0} ? 'carousel-item active' : 'carousel-item'">
                <img th:src="@{'/uploads/' + ${img}}" class="d-block w-100" style="object-fit: cover; max-height: 450px;" th:alt="${passeio.local}">
              </div>
              <div th:if="${#lists.isEmpty(passeio.imagens)}" class="carousel-item active">
                <img th:src="@{/img/placeholder.jpg}" class="d-block w-100" style="object-fit: cover; max-height: 450px;" alt="Placeholder">
              </div>
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
              <span class="carousel-control-prev-icon" aria-hidden="true"></span>
              <span class="visually-hidden">Previous</span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
              <span class="carousel-control-next-icon" aria-hidden="true"></span>
              <span class="visually-hidden">Next</span>
            </button>
          </div>
        </section>

        <!-- DESCRIÇÃO -->
        <section class="detalhes-bloco mb-4">
          <h4 class="fw-semibold">Descrição</h4>
          <p id="passeioDescricao" class="mb-0" th:text="${passeio.descricao}"></p>
        </section>

        <!-- INFORMAÇÕES -->
        <section class="detalhes-bloco mb-4" id="blocoData" th:if="${passeio.dataPasseio != null}">
          <h4 class="fw-semibold">Data do passeio</h4>
          <p id="passeioData" class="mb-0" th:text="${#temporals.format(passeio.dataPasseio, 'dd/MM/yyyy')}"></p>
        </section>

        <section class="detalhes-bloco mb-4" id="blocoRoteiro" th:if="${!#lists.isEmpty(roteiroList)}">
          <h4 class="fw-semibold">Roteiro</h4>
          <ul id="passeioRoteiro" class="mb-0">
            <li th:each="line : ${roteiroList}" th:text="${line}"></li>
          </ul>
        </section>

        <section class="detalhes-bloco mb-4" id="blocoInclusos" th:if="${!#lists.isEmpty(incluiList)}">
          <h4 class="fw-semibold">O que inclui</h4>
          <ul id="passeioInclusos" class="mb-0">
            <li th:each="item : ${incluiList}" th:text="${item}"></li>
          </ul>
        </section>

        <section class="detalhes-bloco mb-4" id="blocoEmbarque" th:if="${!#lists.isEmpty(embarqueList)}">
          <h4 class="fw-semibold">Locais de embarque</h4>
          <ul id="passeioEmbarque" class="mb-0">
            <li th:each="item : ${embarqueList}" th:text="${item}"></li>
          </ul>
        </section>

        <section class="detalhes-bloco mb-4" id="blocoFrequencia" th:if="${passeio.frequencia != null}">
          <h4 class="fw-semibold">Frequência / Horários</h4>
          <p id="passeioFrequencia" class="mb-0" th:text="${passeio.frequencia} + ${passeio.horarios != null ? ' • ' + passeio.horarios : ''}"></p>
        </section>

        <section class="detalhes-bloco mb-4" id="blocoClassificacao" th:if="${passeio.classificacao != null}">
          <h4 class="fw-semibold">Classificação</h4>
          <p id="passeioClassificacao" class="mb-0" th:text="${passeio.classificacao}"></p>
        </section>

        <section class="detalhes-bloco mb-4" id="blocoImportantes" th:if="${!#lists.isEmpty(importantesList)}">
          <h4 class="fw-semibold">Informações importantes</h4>
          <ul id="passeioImportantes" class="mb-0">
            <li th:each="item : ${importantesList}" th:text="${item}"></li>
          </ul>
        </section>

      </div>

      <!-- DIREITA -->
      <div class="col-lg-4">
        <div class="reserva-wrap">
          <div class="card shadow-sm sticky-top card-reserva">
            <div class="card-body">
              <h5 class="card-title fw-bold">Reservar agora</h5>

              <div class="my-3">
                <span class="text-muted">Por apenas</span>
                <div class="display-6 fw-bold">
                  R$ <span id="passeioPreco" th:text="${passeio.valorFinal}">0,00</span>
                </div>
              </div>

              <!-- Form Post para Adicionar ao Carrinho sem JS -->
              <form th:action="@{/carrinho/adicionar}" method="POST">
                <input type="hidden" name="id" th:value="${passeio.id}" />
                <button type="submit" class="btn btn-primary w-100">
                  Comprar
                </button>
              </form>

              <hr>

              <div class="small text-muted">
                Ao comprar, você será redirecionado para o carrinho.
              </div>
            </div>
          </div>
        </div>
      </div>

    </div>

  </main>

  <!-- Footer -->
  <div th:insert="~{footer :: footer}"></div>
</body>
</html>
