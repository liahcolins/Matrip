<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Matrip — Login</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="/css/navbar.css">
  <link rel="stylesheet" href="/css/footer.css">
  <link rel="stylesheet" href="/css/login1.css">

  <link rel="icon" href="/logo-matrip-oficial-01.png" type="image/png">
</head>
<body class="login-page" xmlns:th="http://www.thymeleaf.org">
  <!-- Navbar -->
  <div th:insert="~{navbar :: navbar}"></div>

  <main class="login-shell">
    <div class="login-card" role="form" aria-labelledby="loginTitle">
      <a th:href="@{/}" class="brand">
        <img th:src="@{/logo-matrip-oficial-01.png}" alt="Logo Matrip">
      </a>

      <h1 id="loginTitle" class="login-title">Bem-vindo de volta</h1>
      <p class="login-subtitle">Entre para continuar sua jornada</p>

      <!-- Mensagens de Alerta -->
      <div th:if="${error == 'invalid'}" class="alert alert-danger" role="alert" style="font-size: 14px; padding: 10px; margin-bottom: 15px;">
        E-mail ou senha inválidos.
      </div>
      <div th:if="${success == 'registered'}" class="alert alert-success" role="alert" style="font-size: 14px; padding: 10px; margin-bottom: 15px;">
        Cadastro realizado com sucesso! Faça login abaixo.
      </div>

      <form th:action="@{/web/login}" method="POST">
        <div class="form-group">
          <label for="email">E-mail</label>
          <input id="email" name="email" type="email" required placeholder="seu@email.com">
        </div>

        <div class="form-group">
          <label for="password">Senha</label>
          <div class="password-wrap">
            <input id="password" name="password" type="password" required placeholder="Sua senha">
            <button type="button" class="toggle-pass" aria-label="Mostrar senha" aria-controls="password">👁️</button>
          </div>
          <small class="field-hint">Mínimo de 8 caracteres.</small>
        </div>

        <div class="form-row">
          <label class="check">
            <input type="checkbox" name="remember">
            <span>Lembrar de mim</span>
          </label>

          <a class="link" th:href="@{/paginas/recuperar-senha.html}">Esqueci minha senha</a>
        </div>

        <button type="submit" class="btn-primary">Entrar</button>

        <!-- Divider -->
        <div class="divider"><span>ou</span></div>

        <!-- Botões sociais -->
        <div class="socials">
          <!-- GOOGLE -->
          <a 
            th:href="@{/auth/google}"
            class="btn-social" 
            id="googleLoginBtn"
            aria-label="Entrar com Google"
            style="text-decoration: none; display: flex; gap: 10px; align-items: center; justify-content: center;"
          >
            <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="" aria-hidden="true" style="width:18px;">
            Entrar com Google
          </a>
        </div>

        <p class="signup-hint">
          Novo por aqui? <a class="link" th:href="@{/paginas/cadastro.html}">Crie sua conta</a>
        </p>
      </form>
    </div>

    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>
  </main>

  <!-- Footer -->
  <div th:insert="~{footer :: footer}"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // Mostrar / ocultar senha
    const btnToggle = document.querySelector('.toggle-pass');
    const inputPass = document.getElementById('password');

    btnToggle?.addEventListener('click', () => {
      const isPwd = inputPass.type === 'password';
      inputPass.type = isPwd ? 'text' : 'password';
      btnToggle.setAttribute(
        'aria-label',
        isPwd ? 'Ocultar senha' : 'Mostrar senha'
      );
    });
  </script>
</body>
</html>
