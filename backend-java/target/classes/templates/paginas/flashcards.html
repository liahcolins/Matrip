<section class="flashcards-section" th:fragment="flashcards" xmlns:th="http://www.thymeleaf.org">
  <div class="flashcards-wrapper">
    <div id="homeCategorias">
      <section class="categoria mb-5" th:each="entry : ${categorias}">
        <h3 th:text="${#strings.toUpperCase(entry.key)}">Nome da Categoria</h3>

        <!-- Row dos cards -->
        <div class="cards-row" style="display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 20px;">
          <div class="card" th:each="p : ${entry.value}" style="width: calc(33.333% - 14px); min-width: 280px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-radius: 8px; overflow: hidden; display: flex; flex-direction: column;">
            <img th:src="${p.imagem != null} ? '/uploads/' + ${p.imagem} : '/img/placeholder.jpg'" 
                 th:alt="${p.local}" style="width: 100%; height: 200px; object-fit: cover;" />
            <div class="card-body" style="padding: 15px; flex-grow: 1; display: flex; flex-direction: column;">
              <h5 class="card-title" th:text="${p.local}" style="font-weight: 600; margin-bottom: 10px;">Local</h5>
              <p class="card-text" th:text="${p.descricao}" style="font-size: 14px; color: #666; flex-grow: 1; margin-bottom: 15px;">Descrição</p>

              <div class="card-prices">
                <ul style="list-style: none; padding: 0; margin-bottom: 15px; font-size: 13px;">
                  <li th:if="${p.valorAdulto != null}">
                    <i class="fa-solid fa-user"></i> Adultos: <strong>R$ <span th:text="${p.valorAdulto}">0.00</span></strong>
                  </li>
                  <li th:if="${p.valorEstudante != null}">
                    <i class="fa-solid fa-graduation-cap"></i> Estudantes: <strong>R$ <span th:text="${p.valorEstudante}">0.00</span></strong>
                  </li>
                  <li th:if="${p.valorCrianca != null}">
                    <i class="fa-solid fa-child"></i> Crianças: <strong>R$ <span th:text="${p.valorCrianca}">0.00</span></strong>
                  </li>
                </ul>

                <div class="price-highlight" style="display: flex; justify-content: space-between; align-items: center; background: #f8f9fa; padding: 10px; border-radius: 6px;">
                  <div class="price-text" style="display: flex; flex-direction: column;">
                    <span style="font-size: 11px; color: #888;">Por apenas</span>
                    <strong style="color: #2b78e4; font-size: 18px;">R$ <span th:text="${p.valorFinal}">0.00</span></strong>
                  </div>

                  <!-- Botão de Comprar/Detalhes -->
                  <a th:href="@{/paginas/Detalhes.html(id=${p.id})}" class="btn-comprar" style="background: #2b78e4; color: white; border: none; padding: 8px 16px; border-radius: 4px; font-weight: 500; font-size: 14px; text-decoration: none;">
                    Comprar
                  </a>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </div>
  </div>
</section>
