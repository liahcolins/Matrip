<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Matrip — Cadastro</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- CSS principal -->
  <link rel="stylesheet" href="../css/login.css">
  <link rel="stylesheet" href="../css/navbar.css">
  <link rel="stylesheet" href="../css/footer.css">
  <link rel="stylesheet" href="../css/cadastro.css">

  <link rel="icon" href="/logo-matrip-oficial-01.png" type="image/png">
</head>
<body xmlns:th="http://www.thymeleaf.org">
  <!-- Navbar -->
  <div th:insert="~{navbar :: navbar}"></div>

  <main class="login-shell">
    <div class="login-card" role="form" aria-labelledby="cadastroTitle">
      <a th:href="@{/}" class="brand">
        <img th:src="@{/logo-matrip-oficial-01.png}" alt="Logo Matrip">
      </a>

      <h1 id="cadastroTitle" class="login-title">Crie sua conta</h1>
      <p class="login-subtitle">Preencha os dados abaixo para se cadastrar</p>

      <!-- Mensagens de Alerta -->
      <div th:if="${error == 'duplicate'}" class="alert alert-danger" role="alert" style="font-size: 14px; padding: 10px; margin-bottom: 15px;">
        Este e-mail já está cadastrado.
      </div>
      <div th:if="${error == 'failed'}" class="alert alert-danger" role="alert" style="font-size: 14px; padding: 10px; margin-bottom: 15px;">
        Erro ao cadastrar usuário. Tente novamente mais tarde.
      </div>

      <form th:action="@{/web/cadastro}" method="POST">
        <div class="form-group">
          <label for="nome">Nome</label>
          <input id="nome" name="nome" type="text" required placeholder="Seu nome completo">
        </div>

        <div class="form-group">
          <label for="email">E-mail</label>
          <input id="email" name="email" type="email" required placeholder="seu@email.com">
        </div>

        <div class="form-group">
          <label for="senha">Senha</label>
          <div class="password-wrap">
            <input id="senha" name="senha" type="password" required placeholder="Crie uma senha">
            <button type="button" class="toggle-pass" aria-label="Mostrar senha" aria-controls="senha">👁️</button>
          </div>
          <small class="field-hint">Mínimo de 8 caracteres.</small>
        </div>

        <div class="form-row">
          <label class="check">
            <input type="checkbox" name="termos" required>
            <span>Eu li e aceito os <a class="link" href="#">termos de uso</a></span>
          </label>
        </div>

        <button id="btn-submit" type="submit" class="btn-primary">Cadastrar</button>

        <p class="signup-hint">Já tem conta? <a class="link" th:href="@{/paginas/login1.html}">Entrar</a></p>
      </form>
    </div>

    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>
  </main>

  <!-- Footer -->
  <div th:insert="~{footer :: footer}"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // Mostrar / ocultar senha
    const btnToggle = document.querySelector('.toggle-pass');
    const inputPass = document.getElementById('senha');
    btnToggle?.addEventListener('click', () => {
      const isPwd = inputPass.type === 'password';
      inputPass.type = isPwd ? 'text' : 'password';
      btnToggle.setAttribute('aria-label', isPwd ? 'Ocultar senha' : 'Mostrar senha');
    });
  </script>
</body>
</html>
