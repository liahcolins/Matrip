<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrinho — Matrip</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

  <link rel="stylesheet" href="/css/carrinho.css">
  <link rel="stylesheet" href="/css/navbar.css">
</head>

<body xmlns:th="http://www.thymeleaf.org">

  <!-- Navbar -->
  <div th:insert="~{navbar :: navbar}"></div>

  <header class="cart-header text-center my-4">
    <h2><i class="bi bi-cart4"></i> Carrinho</h2>
  </header>

  <div class="container my-5">
    <div class="row g-4">

      <div class="col-lg-8">
        <div id="cartItems">
          <!-- Loop de itens do carrinho -->
          <div th:each="item : ${cart}" class="cart-item-row" style="display:flex; justify-content:space-between; align-items:center; border:1px solid #ddd; padding:15px; border-radius:8px; margin-bottom:15px;">
            <div style="display:flex; gap:15px; align-items:center;">
              <img th:src="${item.imagem != null} ? ${item.imagem} : '/img/placeholder.jpg'" style="width:80px; height:60px; object-fit:cover; border-radius:4px;" />
              <div>
                <h5 th:text="${item.titulo}" style="margin:0; font-size:16px; font-weight:600;">Título do passeio</h5>
                <div style="font-size:14px; color:#555; margin-top:5px;">
                  <span>Preço: <strong>R$ <span th:text="${item.preco}">0,00</span></strong></span>
                  <span class="ms-3">Quantidade: <strong th:text="${item.quantidade}">1</strong></span>
                </div>
              </div>
            </div>
            
            <form th:action="@{/carrinho/remover}" method="POST">
              <input type="hidden" name="id" th:value="${item.id}" />
              <button type="submit" class="btn btn-sm btn-outline-danger">
                <i class="bi bi-trash"></i> Remover
              </button>
            </form>
          </div>
          
          <div th:if="${#lists.isEmpty(cart)}" class="text-center my-5">
            <p class="text-muted" style="font-size: 16px;">Seu carrinho está vazio.</p>
            <a th:href="@{/}" class="btn btn-primary mt-3">Ver Experiências</a>
          </div>
        </div>
      </div>

      <div class="col-lg-4">
        <div class="summary-box" style="border: 1px solid #ddd; padding:20px; border-radius:8px; background:#fcfcfc;">
          <h5 style="font-weight:700; margin-bottom:20px;">Resumo do Pedido</h5>

          <div class="d-flex justify-content-between mb-2">
            <span>Subtotal</span>
            <strong>R$ <span th:text="${total}">0,00</span></strong>
          </div>

          <div class="d-flex justify-content-between mb-3">
            <span>Taxas</span>
            <strong>R$ 0,00</strong>
          </div>

          <hr>

          <div class="d-flex justify-content-between mb-4">
            <h5 style="margin:0; font-weight:600;">Total</h5>
            <h5 class="text-success" style="margin:0; font-weight:700;">R$ <span th:text="${total}">0,00</span></h5>
          </div>

          <!-- Botão Finalizar Compra -->
          <a th:href="@{/paginas/checkout.html}" th:if="${!#lists.isEmpty(cart)}" class="btn btn-success w-100 py-2" style="font-weight:600; text-decoration:none; text-align:center; display:block;">
            Finalizar Compra
          </a>
          <button th:if="${#lists.isEmpty(cart)}" class="btn btn-success w-100 py-2" disabled style="font-weight:600;">
            Finalizar Compra
          </button>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
