<div id="carouselExampleCaptions" class="carousel slide" data-bs-ride="carousel" th:fragment="carrossel" xmlns:th="http://www.thymeleaf.org">
  <div class="carousel-indicators" id="carouselIndicators">
    <button th:each="p, iterStat : ${passeios}" 
            th:if="${iterStat.index < 4}" 
            type="button" 
            data-bs-target="#carouselExampleCaptions" 
            th:data-bs-slide-to="${iterStat.index}" 
            th:classappend="${iterStat.index == 0} ? 'active' : ''" 
            th:aria-current="${iterStat.index == 0} ? 'true' : 'false'" 
            th:aria-label="'Slide ' + ${iterStat.index + 1}"></button>
  </div>

  <div class="carousel-inner" id="carouselInner">
    <div th:each="p, iterStat : ${passeios}" 
         th:if="${iterStat.index < 4}" 
         th:classappend="${iterStat.index == 0} ? 'carousel-item active' : 'carousel-item'">
      <img class="d-block w-100" 
           th:alt="${p.local} + ' - ' + ${p.cidade} + '/' + ${p.estado}" 
           th:src="${p.imagem != null} ? '/uploads/' + ${p.imagem} : '/img/placeholder.jpg'">
      <div class="carousel-caption d-none d-md-block">
        <h5 th:text="${p.local} + ' – ' + ${p.cidade} + '/' + ${p.estado}">Título</h5>
        <p th:text="${p.descricao}">Descrição</p>
      </div>
    </div>
    
    <!-- Se não houver passeios -->
    <div th:if="${#lists.isEmpty(passeios)}" class="carousel-item active">
      <img th:src="@{/img/placeholder.jpg}" class="d-block w-100" alt="Sem passeios">
      <div class="carousel-caption d-none d-md-block">
        <h5>Nenhum passeio cadastrado</h5>
        <p>Cadastre um passeio para aparecer aqui.</p>
      </div>
    </div>
  </div>

  <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide="prev">
    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Anterior</span>
  </button>

  <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide="next">
    <span class="carousel-control-next-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Próximo</span>
  </button>
</div>
