<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Matrip — Recuperar Senha</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="/css/navbar.css">
  <link rel="stylesheet" href="/css/footer.css">
  <link rel="stylesheet" href="/css/login1.css">

  <link rel="icon" href="/logo-matrip-oficial-01.png" type="image/png">
</head>
<body class="login-page">
  <div id="navbar-container"></div>

  <main class="login-shell">
    <div class="login-card" role="form" aria-labelledby="loginTitle">
      
      <a href="/" class="brand">
        <img src="/logo-matrip-oficial-01.png" alt="Logo Matrip">
      </a>

      <h1 id="loginTitle" class="login-title">Recuperar Senha</h1>
      <p class="login-subtitle">Informe seu e-mail para receber o link de redefinição.</p>

      <form id="forgotPasswordForm" novalidate>
        
        <div class="form-group" style="margin-top: 15px;">
          <label for="email">E-mail</label>
          <input id="email" name="email" type="email" required placeholder="seu@email.com">
        </div>

        <button type="submit" class="btn-primary" style="margin-top: 15px;">Enviar link de recuperação</button>

        <p class="signup-hint" style="margin-top: 25px;">
          Lembrou a senha? <a class="link" href="/paginas/login1.html">Voltar para o login</a>
        </p>
        
      </form>
    </div>

    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>
  </main>

  <div id="footer-container"></div>

  <script src="/js/recuperar-senha.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
