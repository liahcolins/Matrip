# Porta do Servidor (idêntico ao Node.js original)
server.port=3000

# Conexão com o Banco de Dados MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/matrip?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=suasenhabd
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configurações do Hibernate JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Configuração de uploads de imagens (Multipart)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Token do Mercado Pago (pode ser configurado também via variável de ambiente MP_ACCESS_TOKEN)
mp.access.token=TEST-13768366402592-011404-0c2bbd39103c8c7f2beee609a6333333-12345678
# Google OAuth placeholder credentials
google.client.id=some-google-client-id

# Configurar Jackson para usar snake_case por padrão nas APIs
spring.jackson.property-naming-strategy=SNAKE_CASE

